workflows:
  ios-no-signing:
    name: CyberGuard iOS IPA (İmzasız)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Flutter build iOS imzasız
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --no-tree-shake-icons

      - name: IPA oluştur
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r CyberGuard.ipa Payload/
          mv CyberGuard.ipa $CM_BUILD_DIR/

    artifacts:
      - $CM_BUILD_DIR/CyberGuard.ipa

    publishing:
      email:
        recipients:
          - capartaha183@gmail.com
        notify:
          success: true
          failure: true
