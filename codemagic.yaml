workflows:
  ios-no-signing:
    name: CyberGuard iOS IPA (İmzasız)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Bağımlılıkları yükle
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Flutter build iOS (imzasız)
        script: |
          flutter build ios --release --no-codesign

      - name: IPA oluştur (imzasız)
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r CyberGuard.ipa Payload
          mv CyberGuard.ipa $CM_BUILD_DIR/

    artifacts:
      - $CM_BUILD_DIR/CyberGuard.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - capartaha183@gmail.com
        notify:
          success: true
          failure: true
