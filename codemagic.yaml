workflows:
  ios-no-signing:
    name: CyberGuard iOS IPA (İmzasız)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Bağımlılıkları yükle
        script: flutter pub get

      - name: Bundle ID düzelt
        script: |
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.tahacapar.cyberguard;/g' Runner.xcodeproj/project.pbxproj || true

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Xcode ile imzasız build
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/ios/derived

      - name: IPA oluştur
        script: |
          APP_PATH=$(find build/ios/derived -name "*.app" | head -1)
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r CyberGuard.ipa Payload
          echo "IPA oluşturuldu: $(pwd)/CyberGuard.ipa"

    artifacts:
      - build/ios/ipa/CyberGuard.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - capartaha183@gmail.com
        notify:
          success: true
          failure: true
