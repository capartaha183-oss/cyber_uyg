workflows:
  ios-release:
    name: CyberGuard iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.tahacapar.cyberguard"
        APP_NAME: "CyberGuard"
      ios_signing:
        distribution_type: app_store  # veya ad_hoc
        bundle_identifier: com.tahacapar.cyberguard

    scripts:
      - name: Flutter versiyonunu göster
        script: flutter --version

      - name: Bağımlılıkları yükle
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Flutter build iOS
        script: |
          flutter build ios --release --no-codesign

      - name: IPA oluştur (imzalı)
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - capartaha183@gmail.com  # buraya kendi e-postanı yaz
        notify:
          success: true
          failure: true