name: cyber_guard
description: A comprehensive cybersecurity toolkit application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  animated_text_kit: ^4.2.2
  
  # Security & Crypto
  crypto: ^3.0.3
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  
  # Local Auth (Biometric)
  local_auth: ^2.1.8
  
  # QR Code
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  
  # Utilities
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  clipboard: ^0.1.3
  permission_handler: ^11.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
